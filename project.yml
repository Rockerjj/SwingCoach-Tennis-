name: TennisCoachAI
options:
  bundleIdPrefix: com.tenniscoachai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_NSCameraUsageDescription: "TennisCoachAI needs camera access to record your tennis sessions for analysis."
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "TennisCoachAI uses the microphone to capture audio during your session."
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "TennisCoachAI saves analyzed videos to your photo library."

targets:
  TennisCoachAI:
    type: application
    platform: iOS
    sources:
      - TennisCoachAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tenniscoachai.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: TennisCoachAI/Resources/TennisCoachAI.entitlements
    dependencies:
      - package: Supabase

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
